version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: project-mysql
    restart: always
    environment:
      MYSQL_DATABASE: project
      MYSQL_USER: myuser
      MYSQL_PASSWORD: Admin@123
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - project-network

  springboot-app:
    build: .
    container_name: project-api
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      # DATABASE
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/project
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: Admin@123

      # JPA
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect

      # JWT
      JWT_SECRET: artisan-ecommerce-secret-key-256-bit
      JWT_EXPIRATION: 86400000

      # CORS
      SPRING_WEB_CORS_ALLOWED_ORIGINS: http://localhost:3000
      SPRING_WEB_CORS_ALLOW_CREDENTIALS: "true"

      # GOOGLE OAUTH
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE: email,profile

    networks:
      - project-network

volumes:
  mysql_data:

networks:
  project-network:
    driver: bridge
